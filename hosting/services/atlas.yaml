# atlas — the Strata live map (read-only cloud state pillar).
#
# Collects k8s workload state (read-only RBAC below), mason app phases and
# porter backup status over mTLS, and serves:
#   * StrataService gRPC :8089 (cwb-ca mTLS) — interchange routes the edge
#     path /atlas/api/strata/state here (INTERCHANGE_ATLAS_GRPC).
#   * The operator web map on :8443 (HTTPS via the tailscale LE cert),
#     herald OIDC auth-code gated (client `atlas`, redirect
#     https://atlas.tail41686e.ts.net/oauth/callback).
#
# Tailnet identity mirrors nexus-broker.yaml: tailscaled sidecar (kernel
# mode) joins as `atlas`, the cert sidecar keeps a fresh LE cert for
# atlas.tail41686e.ts.net in the shared /certs volume.
#
# Out-of-band (NEVER in git): Secret cwb/tailscale-auth (TS_AUTHKEY) —
# copied from nexus/tailscale-auth.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: atlas
  namespace: cwb
# GHCR packages are private — pull via the cwb ghcr-pull dockerconfigjson
# secret (out-of-band, same one the other pillar SAs carry).
imagePullSecrets:
  - name: ghcr-pull
---
# Read-only workload visibility — deployments/statefulsets only, NO pods,
# NO secrets, NO write verbs. Bound per-namespace below (cwb, nexus, croft).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: atlas-read
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlas-read
  namespace: cwb
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: atlas-read }
subjects: [{ kind: ServiceAccount, name: atlas, namespace: cwb }]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlas-read
  namespace: nexus
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: atlas-read }
subjects: [{ kind: ServiceAccount, name: atlas, namespace: cwb }]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: atlas-read
  namespace: croft
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: ClusterRole, name: atlas-read }
subjects: [{ kind: ServiceAccount, name: atlas, namespace: cwb }]
---
# Server cert — interchange dials atlas's StrataService over cwb-ca mTLS.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: atlas-tls
  namespace: cwb
spec:
  secretName: atlas-tls
  dnsNames:
    - atlas.core.carriedworld.dev
    - atlas.cwb.svc
    - atlas.cwb.svc.cluster.local
  usages:
    - server auth
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: cwb-ca
    kind: Issuer
---
# Client cert — atlas's identity toward mason (AppService) and porter
# (BackupStatusService). Same shape as porter-backup-client.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: atlas-client
  namespace: cwb
spec:
  secretName: atlas-client-tls
  issuerRef:
    name: cwb-ca
    kind: Issuer
  commonName: atlas
  usages: ["client auth"]
---
# Tailscale node state — persisted so the pod reliably reclaims the `atlas`
# device name across restarts (emptyDir => a new device, and `atlas-N`,
# every restart, which breaks the cert domain). Mirrors nexus-broker.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: atlas-ts-state
  namespace: cwb
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas
  namespace: cwb
  labels:
    app: atlas
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: atlas
  template:
    metadata:
      labels:
        app: atlas
    spec:
      serviceAccountName: atlas
      # The herald issuer URL is the HOST's tailnet name — it doesn't resolve
      # via cluster DNS; alias it to the host's tailnet IP, where `tailscale
      # serve` terminates TLS on :443 (LE cert for dmonextreme.tail41686e.
      # ts.net) and proxies to the gateway on localhost:8080. The pod needs
      # that tailscale-serve HTTPS endpoint for the OIDC token backchannel —
      # same URL base the browser uses for /authorize, so cert names line up
      # end to end. mason/porter still go via cluster DNS.
      hostAliases:
        - ip: "100.91.185.71"
          hostnames: ["dmonextreme.tail41686e.ts.net"]
      # amd64-only digest-pinned image; without this the scheduler may
      # place the pod on robo-dog (arm64) -> exec format error crash-loop
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        # 1. atlas itself — collector loop + StrataService gRPC + web map.
        - name: atlas
          image: ghcr.io/carriedworlduniverse/atlas:sha-e8ec8eb@sha256:bb044607fcbe00c0ffe9b0442d2f0d77ac2fab22c7f7f20ecf4614f12894ae04
          imagePullPolicy: IfNotPresent
          ports:
            - { name: grpc, containerPort: 8089 }
            - { name: https, containerPort: 443 }
          env:
            - { name: ATLAS_GRPC_ADDR, value: ":8089" }
            - { name: ATLAS_HTTP_ADDR, value: ":443" }   # 443: the herald-registered redirect URL has no port
            # server identity (StrataService mTLS, cwb-ca)
            - { name: ATLAS_TLS_CERT, value: /etc/cwb/tls/tls.crt }
            - { name: ATLAS_TLS_KEY, value: /etc/cwb/tls/tls.key }
            - { name: ATLAS_TLS_CA, value: /etc/cwb/tls/ca.crt }
            # client identity (→ mason, porter)
            - { name: ATLAS_CLIENT_TLS_CERT, value: /etc/cwb/client-tls/tls.crt }
            - { name: ATLAS_CLIENT_TLS_KEY, value: /etc/cwb/client-tls/tls.key }
            - { name: ATLAS_CLIENT_TLS_CA, value: /etc/cwb/client-tls/ca.crt }
            - { name: ATLAS_MASON_ADDR, value: "mason.cwb.svc.cluster.local:8086" }
            - { name: ATLAS_PORTER_ADDR, value: "porter-backup.cwb.svc.cluster.local:8087" }
            # web map: herald auth-code gate + the tailscale LE cert for HTTPS
            - { name: ATLAS_OIDC_ISSUER, value: "https://dmonextreme.tail41686e.ts.net/herald" }
            - { name: ATLAS_OIDC_REDIRECT_URL, value: "https://atlas.tail41686e.ts.net/oauth/callback" }
            - { name: ATLAS_HTTPS_CERT, value: /certs/tls.crt }
            - { name: ATLAS_HTTPS_KEY, value: /certs/tls.key }
          volumeMounts:
            - { name: tls, mountPath: /etc/cwb/tls, readOnly: true }
            - { name: client-tls, mountPath: /etc/cwb/client-tls, readOnly: true }
            - { name: ts-certs, mountPath: /certs }
        # 2. Tailnet identity (kernel mode so atlas's listening ports are
        #    transparently reachable on the tailnet IP in the shared netns).
        #    Copied from nexus-broker.yaml.
        - name: tailscale
          image: ghcr.io/tailscale/tailscale:stable
          env:
            - name: TS_AUTHKEY
              valueFrom:
                secretKeyRef:
                  name: tailscale-auth
                  key: TS_AUTHKEY
            - name: TS_HOSTNAME
              value: "atlas"
            - name: TS_USERSPACE
              value: "false"
            - name: TS_STATE_DIR
              value: /var/lib/tailscale
            # Use filesystem state (TS_STATE_DIR), not a k8s Secret — avoids the
            # RBAC requirement on a "tailscale" secret that crashloops otherwise.
            - name: TS_KUBE_SECRET
              value: ""
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          volumeMounts:
            # containerboot puts the real socket at /tmp/tailscaled.sock, so
            # share /tmp (not /var/run/tailscale, which only holds a symlink).
            - { name: ts-sock, mountPath: /tmp }
            # Persist tailscale node state so the pod reliably reclaims the
            # `atlas` device name across restarts (emptyDir => a new device,
            # and `atlas-N`, every restart, which breaks the cert domain).
            - { name: ts-state, mountPath: /var/lib/tailscale }
        # 3. Cert provisioner: waits for tailscaled, then keeps a fresh LE cert
        #    for atlas.tail41686e.ts.net in the shared cert volume.
        - name: tailscale-cert
          image: ghcr.io/tailscale/tailscale:stable
          command: ["/bin/sh", "-c"]
          args:
            - |
              S=/tmp/tailscaled.sock
              until tailscale --socket=$S status >/dev/null 2>&1; do echo "wait tailscaled"; sleep 3; done
              while true; do
                tailscale --socket=$S cert \
                  --cert-file=/certs/tls.crt --key-file=/certs/tls.key \
                  atlas.tail41686e.ts.net || { echo "cert failed; retry"; sleep 30; continue; }
                echo "cert ok; sleep 12h"; sleep 43200
              done
          volumeMounts:
            - { name: ts-sock, mountPath: /tmp }
            - { name: ts-certs, mountPath: /certs }
      volumes:
        - { name: ts-sock, emptyDir: {} }
        - { name: ts-certs, emptyDir: {} }
        - name: ts-state
          persistentVolumeClaim:
            claimName: atlas-ts-state
        - name: tls
          secret:
            secretName: atlas-tls
        - name: client-tls
          secret:
            secretName: atlas-client-tls
---
# In-cluster reach for interchange (StrataService gRPC). The web map is
# reached over the tailnet at https://atlas.tail41686e.ts.net (the sidecar).
apiVersion: v1
kind: Service
metadata:
  name: atlas
  namespace: cwb
  labels:
    app: atlas
spec:
  type: ClusterIP
  selector:
    app: atlas
  ports:
    - name: grpc
      port: 8089
      targetPort: grpc
      protocol: TCP
