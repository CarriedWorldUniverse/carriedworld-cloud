apiVersion: v1
kind: ServiceAccount
metadata: { name: dispatch-controller, namespace: nexus }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata: { name: dispatch-controller, namespace: nexus }
rules:
  - { apiGroups: ["batch"], resources: ["jobs"], verbs: ["get","list","watch","create","delete"] }
  # configmaps need update/patch so the controller can set the brief ConfigMap's
  # OwnerReference to its Job (NEX-461 brief GC).
  - { apiGroups: [""], resources: ["configmaps"], verbs: ["get","list","create","delete","update","patch"] }
  - { apiGroups: [""], resources: ["secrets"], verbs: ["get","list","create","delete"] }
  - { apiGroups: [""], resources: ["pods","pods/log"], verbs: ["get","list","watch"] }
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata: { name: dispatch-controller, namespace: nexus }
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: dispatch-controller }
subjects:
  - { kind: ServiceAccount, name: dispatch-controller, namespace: nexus }
