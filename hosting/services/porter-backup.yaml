# porter-backup — encrypted offsite backups (NEX-625).
# snapshot → casket multi-recipient (cluster key + operator recovery key) →
# custodian-brokered Google OAuth → Drive (ciphertext only). Raw manifest:
# needs hostPath (ro) + curated cross-namespace secret RBAC the convention
# chart doesn't model. Runs in cwb (the cwb-ca Issuer is namespace-scoped;
# porter is platform infra alongside the other pillars).
#
# Out-of-band (NEVER in git):
#   - Secret cwb/porter-cluster-key   (cluster recipient private key)
#   - custodian credential kind=oauth name=google-drive
#   - the operator recovery key lives OFF-MACHINE
apiVersion: v1
kind: ServiceAccount
metadata:
  name: porter-backup
  namespace: cwb
---
# cwb secrets (crown jewels) + porter's own cluster key — get-by-name only
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: porter-backup-secrets
  namespace: cwb
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - almanac-org-seed
      - custodian-org-seed
      - herald-secrets
      - cairn-secrets
      - cwb-internal-ca
      - porter-cluster-key
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: porter-backup-secrets
  namespace: cwb
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: porter-backup-secrets }
subjects: [{ kind: ServiceAccount, name: porter-backup, namespace: cwb }]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: porter-backup-secrets
  namespace: croft
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - croft-operator-token
      - croft-claude-auth
      - croft-gh-token
      - croft-ssh-pubkey
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: porter-backup-secrets
  namespace: croft
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: porter-backup-secrets }
subjects: [{ kind: ServiceAccount, name: porter-backup, namespace: cwb }]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: porter-backup-secrets
  namespace: nexus
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - nexus-broker-env
      - aspect-keyfile-anvil
      - aspect-keyfile-harrow
      - aspect-keyfile-keel
      - aspect-keyfile-maren
      - aspect-keyfile-plumb
      - aspect-keyfile-shadow
      - observer-keyfile
      - lynxai-env
      - hosting-git-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: porter-backup-secrets
  namespace: nexus
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: porter-backup-secrets }
subjects: [{ kind: ServiceAccount, name: porter-backup, namespace: cwb }]
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: porter-backup-client
  namespace: cwb
spec:
  secretName: porter-backup-client-tls
  issuerRef:
    name: cwb-ca
    kind: Issuer
  commonName: porter-backup
  usages: ["client auth"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: porter-backup
  namespace: cwb
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: porter-backup }
  template:
    metadata:
      labels: { app: porter-backup }
    spec:
      serviceAccountName: porter-backup
      containers:
        - name: porter-backup
          image: ghcr.io/carriedworlduniverse/porter-backup:sha-f062874@sha256:dd85f09829eb0f31f5d221b24a460d850682c83d3117bc0663fc90f139c0cea6
          imagePullPolicy: IfNotPresent
          args: ["sync"]
          env:
            - { name: PORTER_ALMANAC_GRPC_ADDR, value: "almanac.cwb.svc.cluster.local:8083" }
            - { name: PORTER_ALMANAC_PARAM, value: "cwb/porter/backup/sources" }
            - { name: PORTER_DRIVE_FOLDER, value: "CarriedWorld-Porter/backups" }
            - { name: PORTER_INTERVAL, value: "6h" }
            - name: PORTER_RECIPIENTS
              value: "nkRv85B3NZCIPisbTAR5xe/Ru8dIq9TcsMs2Lf0dLW8=,GCIrPC3XNio56jGuAO6/x+h8uZ7j35iVvNJZT+oqz0M="
            - { name: CUSTODIAN_GRPC_ADDR, value: "custodian.cwb.svc.cluster.local:8085" }
            # one org scopes BOTH the custodian bundle and the almanac param read
            - { name: CUSTODIAN_ORG, value: "07244ac5-1fbd-4786-9301-a925f4241306" }
            - { name: PORTER_TLS_CERT, value: /etc/porter/tls/tls.crt }
            - { name: PORTER_TLS_KEY, value: /etc/porter/tls/tls.key }
            - { name: PORTER_TLS_CA, value: /etc/porter/tls/ca.crt }
          volumeMounts:
            - { name: hoststorage, mountPath: /hoststorage, readOnly: true }
            - { name: tls, mountPath: /etc/porter/tls, readOnly: true }
            - { name: work, mountPath: /work }
      volumes:
        - name: hoststorage
          hostPath: { path: /var/lib/rancher/k3s/storage, type: Directory }
        - name: tls
          secret: { secretName: porter-backup-client-tls }
        - name: work
          emptyDir: { sizeLimit: 8Gi }
