# porter-backup — encrypted offsite backups (NEX-625).
# snapshot → casket multi-recipient (cluster key + operator recovery key) →
# custodian-brokered Google OAuth → Drive (ciphertext only). Raw manifest:
# needs hostPath (ro) + curated cross-namespace secret RBAC the convention
# chart doesn't model. Runs in cwb (the cwb-ca Issuer is namespace-scoped;
# porter is platform infra alongside the other pillars).
#
# Out-of-band (NEVER in git):
#   - Secret cwb/porter-cluster-key   (cluster recipient private key)
#   - custodian credential kind=oauth name=google-drive
#   - the operator recovery key lives OFF-MACHINE
apiVersion: v1
kind: ServiceAccount
metadata:
  name: porter-backup
  namespace: cwb
# GHCR packages are private — pull via the cwb ghcr-pull dockerconfigjson
# secret (out-of-band, same one the other pillar SAs carry).
imagePullSecrets:
  - name: ghcr-pull
---
# cwb secrets (crown jewels) + porter's own cluster key — get-by-name only
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: porter-backup-secrets
  namespace: cwb
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - almanac-org-seed
      - custodian-org-seed
      - herald-secrets
      - cairn-secrets
      - cwb-internal-ca
      - porter-cluster-key
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: porter-backup-secrets
  namespace: cwb
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: porter-backup-secrets }
subjects: [{ kind: ServiceAccount, name: porter-backup, namespace: cwb }]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: porter-backup-secrets
  namespace: croft
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - croft-operator-token
      - croft-claude-auth
      - croft-gh-token
      - croft-ssh-pubkey
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: porter-backup-secrets
  namespace: croft
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: porter-backup-secrets }
subjects: [{ kind: ServiceAccount, name: porter-backup, namespace: cwb }]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: porter-backup-secrets
  namespace: nexus
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames:
      - nexus-broker-env
      - aspect-keyfile-anvil
      - aspect-keyfile-harrow
      - aspect-keyfile-keel
      - aspect-keyfile-maren
      - aspect-keyfile-plumb
      - aspect-keyfile-shadow
      - observer-keyfile
      - lynxai-env
      - hosting-git-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: porter-backup-secrets
  namespace: nexus
roleRef: { apiGroup: rbac.authorization.k8s.io, kind: Role, name: porter-backup-secrets }
subjects: [{ kind: ServiceAccount, name: porter-backup, namespace: cwb }]
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: porter-backup-client
  namespace: cwb
spec:
  secretName: porter-backup-client-tls
  issuerRef:
    name: cwb-ca
    kind: Issuer
  commonName: porter-backup
  usages: ["client auth"]
---
# Server cert for the BackupStatusService (the Strata map's backup clock).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: porter-backup-tls
  namespace: cwb
spec:
  secretName: porter-backup-tls
  dnsNames:
    - porter-backup.core.carriedworld.dev
    - porter-backup.cwb.svc
    - porter-backup.cwb.svc.cluster.local
  usages:
    - server auth
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: cwb-ca
    kind: Issuer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: porter-backup
  namespace: cwb
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: porter-backup }
  template:
    metadata:
      labels: { app: porter-backup }
    spec:
      serviceAccountName: porter-backup
      # amd64-only digest-pinned image; without this the scheduler may
      # place the pod on robo-dog (arm64) -> exec format error crash-loop
      nodeSelector:
        kubernetes.io/arch: amd64
      containers:
        - name: porter-backup
          image: ghcr.io/carriedworlduniverse/porter-backup:sha-8fcf7e2@sha256:2f2ad2ed76d6945c43e4bd71f80dba5532c080752a9a94b7ba780c7ce5dcb469
          imagePullPolicy: IfNotPresent
          args: ["sync"]
          env:
            - { name: PORTER_ALMANAC_GRPC_ADDR, value: "almanac.cwb.svc.cluster.local:8083" }
            - { name: PORTER_ALMANAC_PARAM, value: "cwb/porter/backup/sources" }
            - { name: PORTER_DRIVE_FOLDER, value: "CarriedWorld-Porter/backups" }
            - { name: PORTER_INTERVAL, value: "6h" }
            - name: PORTER_RECIPIENTS
              value: "nkRv85B3NZCIPisbTAR5xe/Ru8dIq9TcsMs2Lf0dLW8=,GCIrPC3XNio56jGuAO6/x+h8uZ7j35iVvNJZT+oqz0M="
            - { name: CUSTODIAN_GRPC_ADDR, value: "custodian.cwb.svc.cluster.local:8085" }
            # one org scopes BOTH the custodian bundle and the almanac param read
            - { name: CUSTODIAN_ORG, value: "07244ac5-1fbd-4786-9301-a925f4241306" }
            - { name: PORTER_TLS_CERT, value: /etc/porter/tls/tls.crt }
            - { name: PORTER_TLS_KEY, value: /etc/porter/tls/tls.key }
            - { name: PORTER_TLS_CA, value: /etc/porter/tls/ca.crt }
            # BackupStatusService (Strata map backup clock) — server mTLS
            - { name: PORTER_GRPC_ADDR, value: ":8087" }
            - { name: PORTER_SERVER_TLS_CERT, value: /etc/porter/server-tls/tls.crt }
            - { name: PORTER_SERVER_TLS_KEY, value: /etc/porter/server-tls/tls.key }
            - { name: PORTER_SERVER_TLS_CA, value: /etc/porter/server-tls/ca.crt }
          ports:
            - { name: grpc, containerPort: 8087 }
          volumeMounts:
            - { name: hoststorage, mountPath: /hoststorage, readOnly: true }
            - { name: tls, mountPath: /etc/porter/tls, readOnly: true }
            - { name: server-tls, mountPath: /etc/porter/server-tls, readOnly: true }
            - { name: work, mountPath: /work }
      volumes:
        - name: hoststorage
          hostPath: { path: /var/lib/rancher/k3s/storage, type: Directory }
        - name: tls
          secret: { secretName: porter-backup-client-tls }
        - name: server-tls
          secret: { secretName: porter-backup-tls }
        - name: work
          emptyDir: { sizeLimit: 8Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: porter-backup
  namespace: cwb
  labels:
    app: porter-backup
spec:
  type: ClusterIP
  selector:
    app: porter-backup
  ports:
    - name: grpc
      port: 8087
      targetPort: grpc
      protocol: TCP
