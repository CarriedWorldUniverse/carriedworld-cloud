# TEMPLATE — do not commit a real token. Create the real secret imperatively:
#
#   sudo k3s kubectl -n kube-system create secret generic cloudflare-dns-token \
#     --from-literal=token="$(cat /path/to/token)"
#
# Token requirements (mint at dash.cloudflare.com → My Profile → API Tokens):
#   Zone → DNS → Edit,  Zone → Zone → Read,  scoped to zone carriedworld.dev only.
apiVersion: v1
kind: Secret
metadata:
  name: cloudflare-dns-token
  namespace: kube-system
type: Opaque
stringData:
  token: "PASTE-CLOUDFLARE-API-TOKEN-HERE"
