# HelmChartConfig for the k3s-bundled Traefik (applies once traefik is
# re-enabled — inert until then, but staged here and NOT auto-applied:
# hosting/staged/ is outside apply.sh's globs).
#
# Adds: Cloudflare DNS-01 ACME resolver + the two wildcard SANs
# (*.core.carriedworld.dev, *.nexus.carriedworld.dev) on websecure.
# Requires secret kube-system/cloudflare-dns-token (see the .example file).
apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  valuesContent: |-
    deployment:
      initContainers:
        # acme.json must exist with 0600 or traefik refuses to start
        - name: volume-permissions
          image: busybox:1.36
          command: ["sh", "-c", "touch /data/acme.json && chmod 600 /data/acme.json"]
          volumeMounts:
            - name: data
              mountPath: /data
    persistence:
      # Persist acme.json so certs survive pod restarts (LE rate limits are real:
      # 5 duplicate certs/week — do NOT run without persistence).
      enabled: true
      size: 128Mi
      storageClass: local-path
    env:
      - name: CF_DNS_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-dns-token
            key: token
    certificatesResolvers:
      cloudflare:
        acme:
          email: jacinta@darksoft.co.nz
          storage: /data/acme.json
          # Uncomment for a dry run against the LE staging CA first (untrusted
          # certs, but proves the DNS-01 flow without burning prod rate limits):
          # caServer: https://acme-staging-v02.api.letsencrypt.org/directory
          dnsChallenge:
            provider: cloudflare
            # Bypass local/split DNS when checking TXT propagation
            resolvers:
              - "1.1.1.1:53"
              - "8.8.8.8:53"
    # NOTE: ports.websecure.tls.certResolver/domains silently do NOT render in
    # the k3s-bundled chart (observed 2026-07-17: only http.tls=true appeared in
    # pod args) — additionalArguments pass through verbatim, so set them there.
    additionalArguments:
      - "--entryPoints.websecure.http.tls.certResolver=cloudflare"
      - "--entryPoints.websecure.http.tls.domains[0].main=core.carriedworld.dev"
      - "--entryPoints.websecure.http.tls.domains[0].sans=*.core.carriedworld.dev"
      - "--entryPoints.websecure.http.tls.domains[1].main=nexus.carriedworld.dev"
      - "--entryPoints.websecure.http.tls.domains[1].sans=*.nexus.carriedworld.dev"
