apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-alerting-rules
  namespace: logging
data:
  error-alerts.yaml: |
    groups:
      - name: error-logs
        rules:
          - alert: LogErrorBurst
            expr: |
              sum by (namespace, pod) (count_over_time({namespace=~".+"} |~ "(?i)(error|panic|fatal|exception)" [5m])) > 20
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Error log burst: {{ $labels.namespace }}/{{ $labels.pod }} (>20 error lines in 5m)"
