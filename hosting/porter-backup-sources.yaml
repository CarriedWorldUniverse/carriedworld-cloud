# porter backup sources — the operator principle: anything needed to bring the
# platform back up that we can't get out of repos. Applied to almanac at
# cwb/porter/backup/sources (org = the herald org id); the file here is the
# source of truth — re-apply on change.
# Paths are as the porter-backup pod sees them (/hoststorage = ro hostPath of
# /var/lib/rancher/k3s/storage).
- name: secrets
  type: secrets
  secrets:
    - { ns: cwb, name: almanac-org-seed }
    - { ns: cwb, name: custodian-org-seed }
    - { ns: cwb, name: herald-secrets }
    - { ns: cwb, name: cairn-secrets }
    - { ns: cwb, name: cwb-internal-ca }
    - { ns: croft, name: croft-operator-token }
    - { ns: croft, name: croft-claude-auth }
    - { ns: croft, name: croft-gh-token }
    - { ns: croft, name: croft-ssh-pubkey }
    - { ns: nexus, name: nexus-broker-env }
    - { ns: nexus, name: observer-keyfile }
    - { ns: nexus, name: lynxai-env }
    - { ns: nexus, name: hosting-git-token }
    - { ns: cwb, name: porter-cluster-key }
- name: almanac
  type: sqlite
  path: /hoststorage/pvc-a7ec5248-be26-49e4-b787-072410af711e_cwb_almanac-data/almanac.db
- name: custodian
  type: sqlite
  path: /hoststorage/pvc-71b3fcd2-ab7f-48ac-a9d5-3ed3e56da194_cwb_custodian-data/custodian.db
- name: herald
  type: sqlite
  path: /hoststorage/pvc-fd79af3a-eda8-43d8-a71c-62d7d47975ac_cwb_herald-data/herald.db
- name: ledger
  type: sqlite
  path: /hoststorage/pvc-039cf2f0-cd1c-43d0-9860-8b381ffde3c1_cwb_ledger-data/ledger.db
- name: commonplace
  type: sqlite
  path: /hoststorage/pvc-1a6af55b-2cbc-4290-bd5b-813e16a7cb3f_cwb_commonplace-data/commonplace.db
- name: cairn-db
  type: sqlite
  path: /hoststorage/pvc-e34ae563-c8ad-4826-8a03-dd25ed8a149b_cwb_cairn-data/cairn.db
- name: cairn-repos
  type: tar
  path: /hoststorage/pvc-e34ae563-c8ad-4826-8a03-dd25ed8a149b_cwb_cairn-data/repos
- name: sqld
  type: tar
  path: /hoststorage/pvc-6fc549b0-f98d-4cb9-b5b5-c560e3efd8ec_cwb_sqld-data/iku.db
- name: croft-home
  type: tar
  path: /hoststorage/pvc-5758965b-92b8-4003-9af3-70b03bc73936_croft_croft-home
  # ALLOWLIST (not a block-list): croft home is a ~50G tree that is ~99%
  # re-creatable (model weights, build/module caches, repo clones re-clonable
  # from cairn/GitHub). Back up ONLY the irreplaceable, not-in-repos state
  # (~180M measured). Anything new is ignored by DEFAULT — a new big dir can no
  # longer silently balloon the tar past the 8Gi work volume and OOM-evict the
  # pod (the failure that hid for weeks). max_bytes is the fail-loud backstop.
  includes:
    - "*.md"          # shadow's off-git design docs (~/*.md) — not in any repo
    - ".claude"       # skills, agents, CLAUDE.md, and the memory .md (transcripts dropped below)
    - ".config"       # tool/app config
    - ".ctxmap"       # ctxmap working memory (project state)
    - ".mem-backup"   # memory mirror staging (redundant w/ GitHub shadow-memory; kept belt-and-suspenders)
    - "shadow"        # design docs / research / tools (renders + secrets dropped below)
  excludes:
    - ".claude/projects/**/*.jsonl"       # ~1G session transcripts — re-creatable; the memory .md alongside them is kept
    - "shadow/snap_archive"               # ~156M re-renderable game snapshot PNGs
    - "shadow/porter-recovery.key"        # NEVER: decrypts these very backups
    - "shadow/google_oauth_client.json"   # re-creatable in Google console
  max_bytes: 2147483648   # 2 GiB fail-loud guard (~11x the expected ~180M; still well under the 8Gi work cap)


