{{- if .Values.storage.size -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "hosted-service.name" . }}-data
  namespace: {{ include "hosted-service.namespace" . }}
  labels:
{{ include "hosted-service.labels" . | indent 4 }}
spec:
  accessModes:
{{ toYaml .Values.storage.accessModes | indent 4 }}
  {{- with .Values.storage.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.storage.size | quote }}
{{- end }}
