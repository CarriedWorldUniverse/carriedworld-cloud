name: ""
namespace: ""

# Deployment or StatefulSet.
kind: Deployment

# Deployment update strategy: "" (chart default), RollingUpdate, or Recreate.
# Use Recreate for single-writer RWO-PVC workloads (e.g. sqld, the broker).
strategy: ""

image: ""
command: []
args: []

env: {}
envFromSecret: ""

replicas: 1
port: 0

# ServiceAccount the pod runs as (for services needing k8s API access, e.g.
# the dispatch-controller). Empty = default SA. The SA + RBAC are declared
# separately (per-service rbac manifest).
serviceAccountName: ""

storage:
  size: ""
  mountPath: /var/lib/data
  accessModes:
    - ReadWriteOnce
  storageClassName: ""

tailnetEdge: false
tailnetName: ""

identity:
  # none, secret, or custodian.
  mode: none
  secretName: ""
  key: keyfile.json
  mountPath: /etc/nexus
