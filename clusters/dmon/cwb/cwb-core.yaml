          value: /etc/cwb/tls/tls.crt
        - name: LEDGER_TLS_KEY
          value: /etc/cwb/tls/tls.key
        - name: LEDGER_TLS_CA
          value: /etc/cwb/tls/ca.crt
        - name: LEDGER_DB
          value: /var/lib/ledger/ledger.db
        - name: COMMONPLACE_EMBED_URL
          value: http://ollama.model-stack.svc.cluster.local:11434
        image: ghcr.io/carriedworlduniverse/ledger:sha-c2c4c6f@sha256:1958290b9f477f5f72c05e22b1215ea108f8dcbdda5b2d41657f094851f00f40
