apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: cwb-core
  name: cwb-core
  namespace: cwb
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: cwb-core
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: cwb-core
        app.cwb/almanac: "true"
        app.cwb/cairn: "true"
        app.cwb/commonplace: "true"
        app.cwb/custodian: "true"
        app.cwb/herald: "true"
        app.cwb/interchange-gateway: "true"
        app.cwb/ledger: "true"
        app.cwb/mason: "true"
        app.cwb/porter-backup: "true"
    spec:
      containers:
      - env:
        - name: LEDGER_GRPC_ADDR
          value: ledger.cwb.svc:8081
        - name: HERALD_GRPC_ADDR
          value: herald.cwb.svc:8098
        - name: CAIRN_TLS_CERT
          value: /etc/cwb/tls/tls.crt
        - name: CAIRN_TLS_KEY
          value: /etc/cwb/tls/tls.key
        - name: CAIRN_TLS_CA
          value: /etc/cwb/tls/ca.crt
        - name: CAIRN_GRPC_ADDR
          value: :8102
        - name: CAIRN_HTTP_ADDR
          value: :8100
        - name: CAIRN_SSH_ADDR
          value: :2222
        - name: CAIRN_DB
          value: /var/lib/nexus/cairn.db
        - name: CAIRN_REPO_ROOT
          value: /var/lib/nexus/repos
        - name: HERALD_BASE_URL
          value: http://herald.cwb.svc:8099
        - name: LEDGER_BASE_URL
          value: http://ledger.cwb.svc:8081
        - name: CAIRN_HOST_KEY
          valueFrom:
            secretKeyRef:
              key: ssh_host_key
              name: cairn-secrets
        - name: COMMONPLACE_EMBED_URL
          value: http://ollama.model-stack.svc.cluster.local:11434
        image: ghcr.io/carriedworlduniverse/cairn:sha-ae4e9a1@sha256:9237b630412c32767e3d457dbfa3eed4522e04818e92d608b3d6792abb5ec88e
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: cairn-http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 15
          successThreshold: 1
          timeoutSeconds: 1
        name: cairn
        ports:
        - containerPort: 8102
          name: cairn-grpc
          protocol: TCP
        - containerPort: 8100
          name: cairn-http
          protocol: TCP
        - containerPort: 2222
          name: cairn-ssh
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: cairn-http
            scheme: HTTP
          initialDelaySeconds: 2
          periodSeconds: 5
          successThreshold: 1
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 96Mi
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/cwb/tls
          name: cairn-tls
          readOnly: true
        - mountPath: /var/lib/nexus
          name: cairn-data
      - env:
        - name: LEDGER_GRPC_ADDR
          value: :8081
        - name: LEDGER_ADDR
          value: :8081
        - name: LEDGER_AUTH_MODE
