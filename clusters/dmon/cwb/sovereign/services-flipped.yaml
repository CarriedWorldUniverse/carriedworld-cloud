# Existing stable CWB services, CUT OVER to the sovereign (robo-dog) pods.
# Their selectors now point at app=*-rd so the stable DNS names
# (ledger.cwb.svc, herald.cwb.svc, cairn.cwb.svc, cairn-ssh) resolve to the
# relocated deployments. Captured here to document the cutover state.
apiVersion: v1
kind: Service
metadata:
  name: ledger
  namespace: cwb
spec:
  ports:
  - name: http
    port: 8081
    protocol: TCP
    targetPort: 8081
  selector:
    app: ledger-rd
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app: herald
  name: herald
  namespace: cwb
spec:
  ports:
  - name: http
    port: 8099
    protocol: TCP
    targetPort: 8099
  - name: grpc
    port: 8098
    protocol: TCP
    targetPort: 8098
  selector:
    app: herald-rd
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: cairn
  namespace: cwb
spec:
  ports:
  - name: http
    port: 8100
    protocol: TCP
    targetPort: 8100
  - name: grpc
    port: 8102
    protocol: TCP
    targetPort: 8102
  selector:
    app: cairn-rd
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: cairn-ssh
  namespace: cwb
spec:
  ports:
  - name: ssh
    port: 2222
    protocol: TCP
    targetPort: 2222
  selector:
    app: cairn-rd
  type: LoadBalancer
