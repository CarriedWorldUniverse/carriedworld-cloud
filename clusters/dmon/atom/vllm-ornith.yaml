# Ornith-1.0-35B-NVFP4 (Qwen3.5-MoE hybrid GDN) served by vLLM on robo-dog
# (GB10 / ATOM, sm_121). Namespace: model-stack. NodePort 30801; litellm and
# claude-ornith front it. Sole GPU tenant since 2026-07-03 (gpu-mem-util 0.85,
# vision moved to dMon).
#
# PREFIX CACHING (APC): OFF since 2026-07-09. It was enabled 2026-07-06
# (repeated 25K-token prefix TTFT 22.9s -> 0.2s), but the experimental
# hybrid-GDN Mamba-cache "align" mode HARD-WEDGES the engine under
# CONCURRENT requests: with 2 concurrent builder prefills the engine froze
# (stats logger stuck at "Running: 2 reqs" / 0.0 tok/s forever; every later
# request hung until a pod restart). Reproduced twice on the pool's
# concurrent-pair validation (2026-07-09); with APC removed the same pair
# ran clean (2 reqs @ ~3.5K tok/s prefill, both completed). Cost of OFF:
# every turn re-prefills the conversation (~23s at 25K tokens).
# RE-ENABLE ONLY with a newer validated vLLM digest AND a 2-concurrent
# long-prefill soak test passing (see shadow memory
# reference_ornith_prefix_caching for the incident record).
#
# IMAGE: pinned by digest — "nightly" drifts, and hybrid-APC behaviour and
# the qwen3 parsers are version-sensitive. This digest = the build validated
# 2026-07-06. Bump deliberately, then re-run the repeated-prefix TTFT check.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-ornith
  namespace: model-stack
  labels: { app: vllm-ornith }
spec:
  replicas: 1
  strategy: { type: Recreate }          # single GPU — never two pods contending
  selector: { matchLabels: { app: vllm-ornith } }
  template:
    metadata: { labels: { app: vllm-ornith } }
    spec:
      runtimeClassName: nvidia          # nvidia runtime is NOT the cluster default
      nodeSelector: { cwb/gpu: atom-gb10 }
      containers:
        - name: vllm-ornith
          image: vllm/vllm-openai@sha256:44ce83c016728310eda1870d215edb8874cfb5ab56f577e7f4c86acdc11e1e34
          imagePullPolicy: IfNotPresent
          args:
            - --model
            - /cache/Ornith-1.0-35B-NVFP4
            - --served-model-name
            - ornith
            - --trust-remote-code
            - --gpu-memory-utilization
            - "0.85"
            - --max-model-len
            - "262144"
            - --port
            - "8000"
            - --enable-auto-tool-choice
            - --tool-call-parser
            - qwen3_xml
            - --reasoning-parser
            - qwen3
            # --enable-prefix-caching intentionally ABSENT — see APC note above.
          env:
            - name: HF_HUB_OFFLINE
              value: "1"
          ports:
            - containerPort: 8000
          resources:
            limits:
              nvidia.com/gpu: "1"
          volumeMounts:
            - { mountPath: /cache, name: cache }
            - { mountPath: /dev/shm, name: shm }
      volumes:
        - name: cache
          persistentVolumeClaim: { claimName: hf-cache }
        - name: shm
          emptyDir: { medium: Memory, sizeLimit: 16Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-ornith
  namespace: model-stack
  labels: { app: vllm-ornith }
spec:
  type: NodePort
  selector: { app: vllm-ornith }
  ports:
    - port: 8000
      targetPort: 8000
      nodePort: 30801
      protocol: TCP
